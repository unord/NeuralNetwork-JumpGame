<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Jump High Game</title>
	<style>
		:root {
			--bg-1: #0f172a;
			--bg-2: #1e293b;
			--accent: #38bdf8;
			--accent-2: #a78bfa;
			--text: #e2e8f0;
			--danger: #fb7185;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			height: 100vh;
			display: grid;
			place-items: center;
			background:
				radial-gradient(1200px 700px at 12% 10%, rgba(56, 189, 248, 0.26) 0%, rgba(56, 189, 248, 0) 60%),
				radial-gradient(900px 540px at 88% 15%, rgba(167, 139, 250, 0.2) 0%, rgba(167, 139, 250, 0) 62%),
				radial-gradient(700px 520px at 50% 90%, rgba(34, 197, 94, 0.1) 0%, rgba(34, 197, 94, 0) 68%),
				linear-gradient(180deg, #0b1124 0%, #060b17 55%, #02060f 100%);
			color: var(--text);
			font-family: Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
			overflow: hidden;
			zoom: 80%;
			position: relative;
			isolation: isolate;
		}

		body::before,
		body::after {
			content: '';
			position: fixed;
			inset: -10%;
			pointer-events: none;
			z-index: -1;
		}

		body::before {
			background:
				radial-gradient(circle at 25% 35%, rgba(125, 211, 252, 0.16) 0 2px, transparent 3px),
				radial-gradient(circle at 68% 22%, rgba(196, 181, 253, 0.14) 0 2px, transparent 3px),
				radial-gradient(circle at 82% 72%, rgba(147, 197, 253, 0.1) 0 2px, transparent 3px),
				radial-gradient(circle at 12% 78%, rgba(99, 102, 241, 0.12) 0 2px, transparent 3px);
			opacity: 0.75;
			filter: blur(0.4px);
			animation: drift 18s ease-in-out infinite alternate;
		}

		body::after {
			background:
				radial-gradient(480px 260px at 30% 20%, rgba(56, 189, 248, 0.16), transparent 70%),
				radial-gradient(420px 240px at 72% 24%, rgba(167, 139, 250, 0.16), transparent 72%),
				radial-gradient(560px 300px at 50% 95%, rgba(14, 165, 233, 0.12), transparent 74%);
			mix-blend-mode: screen;
			animation: pulseGlow 9s ease-in-out infinite;
		}

		@keyframes pulseGlow {
			0%,
			100% { opacity: 0.55; }
			50% { opacity: 0.9; }
		}

		@keyframes drift {
			0% { transform: translate3d(0, 0, 0) scale(1); }
			100% { transform: translate3d(-14px, 10px, 0) scale(1.02); }
		}

		.game-wrap {
			display: grid;
			gap: 12px;
			justify-items: center;
		}

		canvas {
			border: 2px solid rgba(148, 163, 184, 0.35);
			border-radius: 14px;
			background: linear-gradient(180deg, #0b1022 0%, #081226 40%, #040910 100%);
			box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
		}

		.hud {
			width: min(92vw, 520px);
			max-width: 92vw;
			display: flex;
			justify-content: space-between;
			font-weight: 700;
			letter-spacing: 0.3px;
		}

		.hint {
			opacity: 0.86;
			font-size: 14px;
			text-align: center;
			max-width: min(92vw, 520px);
		}
	</style>
</head>
<body>
	<div class="game-wrap">
		<div class="hud">
			<div>Score: <span id="score">0</span></div>
			<div>Best: <span id="best">0</span></div>
		</div>
		<canvas id="game" width="520" height="700" aria-label="Jump game canvas"></canvas>
		<div class="hint">Use ← → (or A / D) for left/right aim, or no direction for straight up. Hold Space to charge (position locks). Watch for icy platforms: they are slippery.</div>
	</div>
	<script src="./config.js"></script>
	<script src="./mapGenerator.js"></script>
	<script src="./player.js"></script>
	<script src="./control.js"></script>
	<script src="./app.js"></script>
</body>
</html>
